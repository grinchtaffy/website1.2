<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Presentation</title>
    <style>
        /* This removes all margins and makes the iframe fill the whole window */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents scrollbars */
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vSD66YpCNuliLs6LpWW7ZwDS_JIGRT-BhXrg1v0_717YsyjSgYKy187PslHdJ6LJ2LInTu46Ax1qFvq/pubembed?start=false&loop=true&delayms=3000" 
            allowfullscreen="true">
